server {
    listen 80;
    server_name _;

    # Allow .docx uploads up to 25 MB (matches Django FILE_UPLOAD_MAX_MEMORY_SIZE)
    client_max_body_size 25M;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy /api/* to the Django backend container
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Cache hashed asset files aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — any unknown path returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
