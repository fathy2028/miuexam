services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: docx-moodle-backend:latest
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_ALLOWED_HOSTS: "*"
      # Same-origin via nginx → CORS not needed, leave empty to disable
      CORS_ALLOWED_ORIGINS: ""
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    image: docx-moodle-frontend:latest
    ports:
      - "${HOST_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
